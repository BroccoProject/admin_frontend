@if (authService.isAuthenticated() && !authService.isViewer() && !sidebarVisible()) {
  <button class="btn-sidebar-toggle btn-floating" (click)="toggleSidebar()" title="Show navigation panel">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
  </button>
}

<aside class="sidebar" [class.hidden]="!sidebarVisible() || !authService.isAuthenticated() || authService.isViewer()">
  <div class="sidebar-brand">
    <span class="brand-text">Brocco Admin</span>
    <button class="btn-sidebar-toggle btn-close" (click)="toggleSidebar()" title="Hide navigation panel">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <button class="btn-mobile-toggle hide-desktop" (click)="toggleMobileMenu()" aria-label="Toggle mobile menu">
      @if (mobileMenuOpen()) {
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
      }
    </button>
  </div>
  <nav class="sidebar-nav" [class.mobile-expanded]="mobileMenuOpen()">
    @if (authService.isAuthenticated() && !authService.isViewer()) {
      <a routerLink="/recipes" routerLinkActive="active" class="nav-item" (click)="closeMobileMenu()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span>Recipes</span>
      </a>
      <a routerLink="/categories" routerLinkActive="active" class="nav-item" (click)="closeMobileMenu()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <span>Categories</span>
      </a>
      <a routerLink="/access-requests" routerLinkActive="active" class="nav-item" (click)="closeMobileMenu()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Access & Team</span>
      </a>
    }
    @if (authService.isAuthenticated()) {
      <a routerLink="/profile" routerLinkActive="active" class="nav-item nav-item--profile" style="margin-top: auto;" (click)="closeMobileMenu()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>My Profile</span>
      </a>
    }
  </nav>
</aside>
<main class="main-content" [class.sidebar-hidden]="!sidebarVisible() || !authService.isAuthenticated() || authService.isViewer()">
  <router-outlet />
</main>
<app-toast></app-toast>
