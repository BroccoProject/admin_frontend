<div class="login-root">
  <div class="login-panel-left" aria-hidden="true">
    <div class="panel-content">
      <div class="brand">
        <span class="brand-name">Brocco</span>
      </div>
      <p class="panel-tagline">Admin Panel</p>
      <div class="panel-divider"></div>
      <ul class="panel-features">
        <li>
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          Manage recipes &amp; categories
        </li>
        <li>
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          Control team access
        </li>
        <li>
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          Review access requests
        </li>
      </ul>
    </div>
  </div>

  <div class="login-panel-right">
    <div class="login-card">
      <div class="login-logo">
        <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12h6M12 9v6"/></svg>
      </div>
      <h1>Sign in</h1>
      <p class="login-sub">Use your authorized Google account to access the admin panel.</p>

      <button class="btn-google" (click)="login()">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.1 29.3 35 24 35c-6.1 0-11-4.9-11-11s4.9-11 11-11c2.8 0 5.3 1 7.2 2.7l5.7-5.7C33.8 7.4 29.2 5 24 5 12.9 5 4 13.9 4 25s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 19 13 24 13c2.8 0 5.3 1 7.2 2.7l5.7-5.7C33.8 7.4 29.2 5 24 5 16.3 5 9.7 9.1 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 45c5.2 0 9.9-2 13.4-5.2l-6.2-5.2A11 11 0 0 1 24 36c-5.3 0-9.7-2.9-11.3-7.1l-6.5 5C9.5 40.7 16.3 45 24 45z"/>
          <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3a12 12 0 0 1-4.1 5.5l6.2 5.2C43 35.2 44 30.3 44 25c0-1.3-.1-2.6-.4-3.9z"/>
        </svg>
        Continue with Google
      </button>

      <p class="login-footer">Access is restricted to authorized team members only.</p>
    </div>
  </div>
</div>
