<div class="profile-wrapper">
  <h1>My Profile</h1>

  @if (user(); as u) {
    <div class="profile-card">
      <div class="profile-avatar">
        {{ u.email.charAt(0).toUpperCase() }}
      </div>

      <div class="profile-email">{{ u.email }}</div>

      <span class="role-badge" [ngClass]="'role-' + u.role">
        {{ getRoleLabel(u.role) }}
      </span>

      <div class="profile-divider"></div>

      <div class="profile-meta">
        <div class="meta-row">
          <span class="meta-label">Email</span>
          <span class="meta-value">{{ u.email }}</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">Role</span>
          <span class="meta-value">{{ getRoleLabel(u.role) }}</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">Access Level</span>
          <span class="meta-value">
            @if (u.role === 'admin') { Full access }
            @else if (u.role === 'editor') { Read & Write }
            @else { Read only }
          </span>
        </div>
      </div>

      <button class="btn-danger" style="width:100%; justify-content:center;" (click)="logout()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
    </div>
  }
</div>
